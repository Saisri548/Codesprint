<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Programming MCQ Contest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        pre { tab-size: 4; line-height: 1.5; }
        .option-input:checked + span { color: #4f46e5; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-indigo-400">C Master <span class="text-white">Quiz</span></h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest">Technical Assessment 2026</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="hidden md:block text-right">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Time Remaining</p>
                    <div id="timer" class="text-xl font-mono font-bold text-rose-500">--:--</div>
                </div>
                <div class="h-10 w-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                    <i class="fas fa-clock text-indigo-400"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-3 bg-indigo-100 rounded-lg text-indigo-600"><i class="fas fa-list-ol"></i></div>
                <div><p class="text-sm text-slate-500">Questions</p><p class="font-bold">21 Total</p></div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-3 bg-emerald-100 rounded-lg text-emerald-600"><i class="fas fa-star"></i></div>
                <div><p class="text-sm text-slate-500">Total Points</p><p class="font-bold">21 Points</p></div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-3 bg-amber-100 rounded-lg text-amber-600"><i class="fas fa-check-circle"></i></div>
                <div><p class="text-sm text-slate-500">Status</p><p class="font-bold">In Progress</p></div>
            </div>
        </div>

        <form id="quizForm" class="space-y-8"></form>

        <div class="mt-12 mb-20 text-center p-10 glass-morphism rounded-3xl shadow-2xl border border-slate-200">
            <button id="submitBtn" onclick="calculateScore()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-16 rounded-2xl transition-all transform hover:scale-105 shadow-lg active:scale-95 flex items-center mx-auto space-x-3">
                <i class="fas fa-paper-plane"></i>
                <span>Finalize Submission</span>
            </button>
            <div id="score" class="mt-8 hidden animate-bounce">
                <div class="inline-block bg-indigo-50 px-8 py-4 rounded-2xl border-2 border-indigo-200">
                    <span class="text-slate-600 font-medium">Contest Score:</span>
                    <span id="scoreValue" class="text-4xl font-black text-indigo-600 ml-2">0</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const startTime = new Date('2026-03-7T14:30:00');
        const endTime = new Date('2026-03-17T23:59:59'); 
        const pointsPerQuestion = 1;

        const questions = [
            { q: 'Which of the following cannot be checked in a switch-case statement?', options: ['Character', 'Integer', 'Float', 'enum'], answer: 'C' },
            { q: 'If the two strings are identical, then strcmp() function returns:', options: ['-1', '1', '0', 'Yes'], answer: 'C' },
            { q: 'What do the following declaration signify? int *ptr[30];', options: ['ptr is a pointer to an array of 30 integer pointers.', 'ptr is an array of 30 pointers to integers.', 'ptr is an array of 30 integer pointers.', 'ptr is an array 30 pointers.'], answer: 'B' },
            { q: 'Declare the following statement: "A pointer to an array of three chars".', options: ['char *ptr[3]()', 'char (*ptr)*[3]', 'char (*ptr[3])()', 'char (*ptr)[3]'], answer: 'D' },
            { q: 'Correct order of evaluation: z = x + y * z / 4 % 2 - 1', options: ['* / % + - =', '= * / % + -', '/ * % - + =', '* % / - + ='], answer: 'A' },
            { q: 'Correct usage of conditional operators in C?', options: ['a>b ? c=30 : c=40;', 'a>b ? c=30;', 'max = a>b ? a>c?a:c:b>c?b:c', 'return (a>b)?(a:b)'], answer: 'C' },
            { q: 'At which stage is #include<stdio.h> replaced by contents?', options: ['During editing', 'During linking', 'During execution', 'During preprocessing'], answer: 'D' },
            { q: 'What do the \'c\' and \'v\' in argv stand for?', options: ['argument control / vector', 'argument count / vertex', 'argument count / vector', 'argument configuration / visibility'], answer: 'C' },
            { q: 'How many characters are available in newname.txt?', code: '#include <stdio.h>\nint main() {\n    FILE* p; int n = 0;\n    p = fopen("newname.txt", "rb");\n    if (p == NULL) perror("Error opening file");\n    else {\n        while (fgetc(p) != EOF) { ++n; }\n        if (feof(p)) printf("%d\\n", n);\n        fclose(p);\n    }\n    return 0;\n}', options: ['10', '15', 'Depends on the text file', 'None of the mentioned'], answer: 'C' },
            { q: 'What is the name of the myfile2 file after rename?', code: '#include <stdio.h>\nint main() {\n    char oldname[] = "myfile2.txt";\n    char newname[] = "newname.txt";\n    int result = rename(oldname, newname);\n    return 0;\n}', options: ['name', 'new', 'newname', 'None of the mentioned'], answer: 'C' },
            { q: 'Output of: (((i >= i) << i) >> i) <= i?', code: '#include<stdio.h>\nint main() {\n    int i = 16;\n    printf("%d", (((i >= i) << i) >> i) <= i);\n    return 0;\n}', options: ['0', '1', '16', "Can't be determined"], answer: 'B' },
            { q: 'Output of: i++ + ++i', code: '#include<stdio.h>\nint main() {\n    int i = 0;\n    int ans = i++ + ++i;\n    printf("%d", ans);\n    return 0;\n}', options: ['1', '2', '3', "Can't be determined"], answer: 'B' },
            { q: 'What is the output of this nested loop pattern?', code: '#include <iostream>\nusing namespace std;\nint main() {\n    int i, j, var = \'A\';\n    for (i = 5; i >= 1; i--) {\n        for (j = 0; j < i; j++) printf("%c ", (var + j));\n        printf("\\n");\n    }\n    return 0;\n}', options: ['A B C D E (All 5 rows)', 'A B C D (All 4 rows)', 'A B C D A B C A B A', 'A B C D E, A B C D, A B C, A B, A'], answer: 'D' },
            { q: 'What is the output of this C code?', code: '#include <stdio.h>\n#include <stdlib.h>\nint main() {\n    printf("%d\\n", rand() % 1000);\n    return 0;\n}', options: ['Compile time error', 'An integer between 0-1000', 'An integer 0-999 (inclusive)', 'An integer 0-1000 (inclusive)'], answer: 'C' },
            { 
                q: "Match the following memory management situations:", 
                code: "X: m = malloc(5);\n   m = NULL;\n\nY: free(n);\n   n->value = 5;\n\nZ: char *p;\n   *p = 'a';", 
                extra: "1. Using dangling pointer\n2. Using uninitialized pointer\n3. Lost memory",
                options: ["X—1  Y—3  Z—2", "X—2  Y—1  Z—3", "X—3  Y—2  Z—1", "X—3  Y—1  Z—2"], 
                answer: "D" 
            },
            { q: 'Assume char is 1 byte and 2\'s complement. Output?', code: '#include<stdio.h>\nint main() {\n    char c = 125;\n    c = c + 10;\n    printf("%d", c);\n    return 0;\n}', options: ['135', '+INF', '-121', '-8'], answer: 'C' },
            { q: 'Output of the static int num program?', code: 'int r() { static int num=7; return num--; }\nint main() {\n    for(r(); r(); r()) printf("%d", r());\n}', options: ['41', '52', '63', '630'], answer: 'D' },
            { q: 'Output of static char array strcpy?', code: '#include <stdio.h>\nchar *fun() { static char arr[1024]; return arr; }\nint main() {\n    char *str = "geeksforgeeks";\n    strcpy(fun(), str);\n    str = fun();\n    strcpy(str, "geeksquiz");\n    printf("%s", fun());\n    return 0;\n}', options: ['geeksforgeeks', 'geeksquiz', 'geeksforgeeks geeksquiz', 'Compiler Error'], answer: 'B' },
            { q: 'struct Ournode output calculation?', code: 'struct Ournode { char x,y,z; };\nint main() {\n    struct Ournode p = {\'1\',\'0\',\'a\'+2};\n    struct Ournode *q = &p;\n    printf("%c,%c", *((char*)q+1), *((char*)q+2));\n}', options: ['0, c', '0, a+2', '0, 10', '0, b'], answer: 'A' },
            { q: 'Output of char pointer pointer calculation?', code: 'char c[] = "GATE2011";\nchar *p = c;\nprintf("%s", p + p[3] - p[1]);', options: ['GATE2011', '2011', 'E2011', '011'], answer: 'C' },
            { q: 'Call by Value vs Reference result (c - a - b)?', code: 'void f1(int a, int b){ int c; c=a; a=b; b=c; }\nvoid f2(int *a, int *b){ int c; c=*a; *a=*b; *b=c; }\nint main(){\n    int a=4,b=5,c=6;\n    f1(a,b); f2(&b,&c);\n    printf("%d", c - a - b);\n}', options: ['-5', '6', '-6', '0'], answer: 'A' }
        ];

        const form = document.getElementById('quizForm');

        questions.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-200 transition-all hover:shadow-md";
            
            let contentHtml = '';
            if(item.extra) {
                contentHtml = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-4">
                    <pre class="bg-slate-900 text-indigo-300 p-4 rounded-xl text-sm font-mono border border-slate-700 shadow-inner">${item.code}</pre>
                    <pre class="bg-slate-50 text-slate-700 p-4 rounded-xl text-sm font-bold border-l-4 border-indigo-500 shadow-inner">${item.extra}</pre>
                </div>`;
            } else if(item.code) {
                contentHtml = `<pre class="bg-slate-900 text-slate-100 p-4 rounded-xl my-4 text-sm font-mono overflow-x-auto border border-slate-700 shadow-inner">${item.code}</pre>`;
            }

            const optionsHtml = item.options.map((opt, i) => `
                <label class="flex items-center p-4 rounded-xl border border-slate-100 hover:bg-indigo-50 hover:border-indigo-200 cursor-pointer transition-all group">
                    <input type="radio" name="q${index}" value="${String.fromCharCode(65 + i)}" class="option-input w-5 h-5 text-indigo-600 focus:ring-indigo-500 border-slate-300">
                    <span class="ml-4 text-slate-600 group-hover:text-indigo-900 font-medium">${opt}</span>
                </label>
            `).join('');

            qDiv.innerHTML = `
                <div class="flex items-start">
                    <span class="flex-shrink-0 bg-indigo-600 text-white font-black w-10 h-10 flex items-center justify-center rounded-lg shadow-lg mr-6">${index + 1}</span>
                    <div class="flex-1">
                        <p class="text-xl font-bold text-slate-800 leading-tight mb-2">${item.q}</p>
                        ${contentHtml}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-6">${optionsHtml}</div>
                    </div>
                </div>`;
            form.appendChild(qDiv);
        });

        function calculateScore() {
            const now = new Date();
            if (now < startTime) { alert('Contest begins at 14:30!'); return; }
            if (now > endTime) { alert('Contest has ended.'); return; }

            let score = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && selected.value === item.answer) {
                    score += pointsPerQuestion;
                }
            });

            const scoreContainer = document.getElementById('score');
            const scoreValue = document.getElementById('scoreValue');
            scoreContainer.classList.remove('hidden');
            scoreValue.innerText = `${score} / ${questions.length * pointsPerQuestion}`;
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function updateTimer() {
            const now = new Date();
            let timeLeft = endTime - now;
            if (timeLeft <= 0) {
                document.getElementById('timer').textContent = "00:00:00";
                document.getElementById('submitBtn').disabled = true;
                return;
            }
            const hours = Math.floor(timeLeft / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft / 1000 / 60) % 60);
            const seconds = Math.floor((timeLeft / 1000) % 60);
            document.getElementById('timer').textContent = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
